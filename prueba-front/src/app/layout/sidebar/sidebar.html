<!-- Contenedor Principal del Sidebar Dual -->
<div class="flex h-screen flex-shrink-0 border-r border-gray-200">

  <!-- ================= 1. MENÚ PRIMARIO (Izquierda, delgadito) ================= -->
  <div class="w-20 bg-gray-50 border-r border-gray-200 flex flex-col items-center py-4 relative z-10">
    
    <!-- Logo Mini (Opcional, si va en el layout principal lo puedes quitar) -->

      <span class="text-xs text-gray-500">Logo</span>
    </div>

    <!-- Módulo Activo (Productos) - El ícono grande rojo -->
    <button class="w-12 h-12 flex items-center justify-center text-primary mb-6 transition-transform hover:scale-105">
      <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>

    <div class="w-10 border-b border-gray-300 mb-6"></div>

      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path></svg>
    </button>

    </button>
    <button class="w-10 h-10 text-gray-500 hover:text-primary flex items-center justify-center mb-4 transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
    </button>

    <!-- Divisor -->
    <div class="w-10 border-b border-gray-300 mb-4 mt-2"></div>
    
    <button class="w-10 h-10 text-gray-500 hover:text-primary flex items-center justify-center mb-4 transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
    </button>
    <button class="w-10 h-10 text-gray-500 hover:text-primary flex items-center justify-center mb-4 transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
    </button>

    <!-- Espaciador para empujar el footer hacia abajo -->
    <div class="flex-grow"></div>

    <!-- Footer del Menú Primario -->

      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>

<header class="bg-white border-b border-gray-200 h-16 px-4 md:px-6 flex items-center justify-between w-full shadow-sm">
  
  <!-- Izquierda: hamburguesa (solo móvil/tablet) + breadcrumb -->
  <div class="flex items-center gap-3 md:gap-6">

    <!-- Botón hamburguesa: visible en < lg -->
    <button 
      (click)="toggleSidebar()" 
      class="lg:hidden flex items-center justify-center w-9 h-9 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors"
      aria-label="Abrir menú">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>

    <div class="flex items-center gap-3">
      <span class="text-primary font-semibold text-sm cursor-pointer hover:underline hidden sm:inline">
        Productos
      </span>
    </div>

    <div class="h-6 w-px bg-gray-300 hidden sm:block"></div>

    <h1 class="text-gray-800 font-bold text-lg">
      Marcas
    </h1>

  </div>


  <!-- Derecha: acciones + usuario -->
  <div class="flex items-center gap-3 md:gap-6">
    
    <!-- Empresa selector (oculto en móvil pequeño) -->
    <button class="hidden sm:flex items-center gap-1 text-primary font-semibold hover:text-red-700 transition-colors">
      <span>Empresa 1</span>
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
      </svg>
    </button>

    <!-- Iconos de acción (ocultos en móvil muy pequeño) -->
    <div class="hidden md:flex items-center gap-4 text-primary">
      <button class="hover:bg-red-50 p-1.5 rounded-full transition-colors"><img src="assets/campana.png" alt="Notificaciones" class="h-5 w-5"></button>
      <button class="hover:bg-red-50 p-1.5 rounded-full transition-colors"><img src="assets/menu.png" alt="Grid" class="h-5 w-5"></button>
      <button class="hover:bg-red-50 p-1.5 rounded-full transition-colors"><img src="assets/ayuda.png" alt="Ayuda" class="h-5 w-5"></button>
      <button class="hover:bg-red-50 p-1.5 rounded-full transition-colors"><img src="assets/info.png" alt="Info" class="h-5 w-5"></button>
    </div>

    <div class="h-6 w-px bg-gray-300 hidden md:block"></div>

    <!-- Avatar usuario: siempre visible -->
    <div class="flex items-center gap-2 cursor-pointer">
      <div class="w-9 h-9 rounded-full bg-purple-100 text-purple-600 flex items-center justify-center font-bold text-sm flex-shrink-0">
        RG
      </div>
      <!-- Nombre: solo en tablet/desktop -->
      <div class="hidden md:flex flex-col">
        <span class="text-sm font-bold text-gray-800 leading-tight">Rubén Gómez</span>
        <span class="text-xs text-gray-500">Administrador</span>
      </div>
    </div>

  </div>
</header>
